services:
  - type: web
    name: lv-estimator
    runtime: python
    pythonVersion: "3.11.11"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn construction_estimator.web:app --bind 0.0.0.0:$PORT
    plan: free

  - type: web
    name: work-portal-api
    runtime: python
    pythonVersion: "3.11.11"
    rootDir: work_portal/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: APP_SECRET_KEY
        sync: false
      - key: PORTAL_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: READAI_API_KEY
        sync: false
      - key: SUMMARIZER_MODEL
        value: claude-haiku-4-5-20251001

  - type: web
    name: lv-exec
    runtime: python
    pythonVersion: "3.11.11"
    rootDir: lv_exec_portal/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: APP_SECRET_KEY
        sync: false
      - key: PORTAL_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUMMARIZER_MODEL
        value: claude-haiku-4-5-20251001

  - type: web
    name: sixpeakapps
    runtime: python
    pythonVersion: "3.11.11"
    rootDir: sixpeakapps
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    plan: free
