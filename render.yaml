        sync: false
      - key: PORTAL_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUMMARIZER_MODEL
        value: claude-haiku-4-5-20251001
      # --- follow-up email job ---
      - key: FOLLOWUP_PORTAL_NAME
        value: LV Executive
      - key: FOLLOWUP_SUBJECT_PREFIX
        value: LV Exec Follow-up
      - key: FOLLOWUP_PORTAL_URL
        value: https://lvexec.sixpeakapps.com
      - key: FOLLOWUP_CADENCE
        value: biweekly
      - key: FOLLOWUP_CAL_EVENT_ID
        value: 6epjj6rec5vn2kn3vekibvpf7t
      - key: FOLLOWUP_SENDER_EMAIL
        value: cma@sixpeakcapital.com
      - key: FOLLOWUP_DRY_RUN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false

