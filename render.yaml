services:
  - type: web
    name: lv-estimator
    runtime: python
    pythonVersion: "3.11.11"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn construction_estimator.web:app --bind 0.0.0.0:$PORT
    plan: free

  - type: web
    name: work-portal-api
    runtime: python
    pythonVersion: "3.11.11"
    rootDir: work_portal/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: APP_SECRET_KEY
        sync: false
      - key: PORTAL_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: READAI_API_KEY
        sync: false
      - key: SUMMARIZER_MODEL
        value: claude-haiku-4-5-20251001
      # --- follow-up email job ---
      - key: FOLLOWUP_PORTAL_NAME
        value: L10 Weekly
      - key: FOLLOWUP_SUBJECT_PREFIX
        value: L10 Follow-up
      - key: FOLLOWUP_PORTAL_URL
        value: https://l10.sixpeakapps.com
      - key: FOLLOWUP_CADENCE
        value: weekly
      - key: FOLLOWUP_CAL_EVENT_ID
        value: 7jb1kbiupq9ttrljuv3utu2km7
      - key: FOLLOWUP_SENDER_EMAIL
        value: cma@sixpeakcapital.com
      - key: FOLLOWUP_DRY_RUN
        sync: false           # default true; flip to false in dashboard after dry-run review
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false

  - type: web
    name: lv-exec
    runtime: python
    pythonVersion: "3.11.11"
