<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}L10 Portal{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='portal.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="wrap">
            <div class="brand">
                <svg class="brand-logo" viewBox="0 0 96 40" xmlns="http://www.w3.org/2000/svg" aria-label="Six Peak">
                    <g fill="#C4581A">
                        <polygon points="0,40 9,20 18,40" />
                        <polygon points="14,40 25,6 36,40" />
                        <polygon points="32,40 42,22 52,40" />
                        <polygon points="48,40 60,10 72,40" />
                        <polygon points="66,40 75,24 84,40" />
                        <polygon points="80,40 88,28 96,40" />
                    </g>
                </svg>
                <div class="brand-text">
                    <span class="brand-title">L10 Weekly Portal</span>
                    <span class="brand-date">{{ today_display }}</span>
                </div>
            </div>
            <nav class="top-nav">
                <a href="{{ url_for('portal') }}">Dashboard</a>
            </nav>
        </div>
    </header>
    <main class="wrap main-content">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <div class="wrap">
            <span>L10 Weekly — auto-updated after each meeting</span>
        </div>
    </footer>
    <script src="{{ url_for('static', filename='portal.js') }}"></script>
</body>
</html>
